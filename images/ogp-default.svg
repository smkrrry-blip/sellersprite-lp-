  <text x="990" y="220" font-family="'Courier New', 'Consolas', monospace" font-size="54" fill="#ffffff" font-weight="900" text-anchor="middle">CJ9852</text>
  <text x="990" y="270" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="32" fill="#ffffff" font-weight="700" text-anchor="middle">30% OFF</text>
