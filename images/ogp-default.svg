  <polygon points="740,0 780,0 780,630 700,630" fill="#e8821a"/>
  <!-- Left text area -->
  <!-- Site name -->
  <text x="80" y="110" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="28" fill="#e8821a" font-weight="700">セラースプライト公式代理店</text>
  <!-- Main headline -->
  <text x="80" y="210" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="52" fill="#ffffff" font-weight="900">Amazon販売を</text>
  <text x="80" y="278" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="52" fill="#ffffff" font-weight="900">加速させる</text>
  <text x="80" y="346" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="52" fill="#ffffff" font-weight="900">最強リサーチツール</text>
