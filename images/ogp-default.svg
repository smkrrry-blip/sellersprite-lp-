  <text x="80" y="430" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="26" fill="#aaaacc">キーワード・競合・市場をまとめて分析</text>
  <!-- URL -->
  <text x="80" y="560" font-family="'Courier New', monospace" font-size="20" fill="#888888">smkrrry-blip.github.io/sellersprite-lp-</text>
